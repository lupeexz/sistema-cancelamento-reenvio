<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Registros efetuados</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<main class="app shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">CR</div>
      <div>
        <strong>Controle interno</strong>
        <small>Reenvios/estornos</small>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Novo cadastro
      </a>
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        Dashboard
      </a>
      <a class="active" href="registros.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        Registros efetuados
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="secondary" onclick="logout()" style="width:100%">Sair</button>
    </div>
  </aside>

  <section class="main">
    <div class="topbar">
      <div class="page-title">
        <p class="eyebrow">Histórico</p>
        <h1>Registros efetuados</h1>
        <p class="muted">Consulte pedidos, WhatsApp, rastreios e valores já lançados.</p>
      </div>
      <button id="refreshBtn" type="button" class="secondary">Atualizar</button>
    </div>

    <div class="card toolbar">
      <label class="field">
        <span>Busca</span>
        <input id="search" placeholder="Pedido, WhatsApp, rastreio, loja..."/>
      </label>
      <label class="field">
        <span>Tipo</span>
        <select id="type">
          <option value="all">Todos</option>
          <option value="Cancelamento">Cancelamento</option>
          <option value="Reenvio">Reenvio</option>
        </select>
      </label>
      <label class="field">
        <span>Data inicial</span>
        <input id="dateStart" type="date"/>
      </label>
      <label class="field">
        <span>Data final</span>
        <input id="dateEnd" type="date"/>
      </label>
      <button class="secondary" onclick="exportCsv()">Exportar CSV</button>
    </div>

    <br>

    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Loja</th>
              <th>Data Pedido</th>
              <th>Motivo</th>
              <th>Valor</th>
              <th>Pedido</th>
              <th>WhatsApp</th>
              <th>Rastreio</th>
              <th>Data Reenvio</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>
<script src="config.js"></script>
<script src="shared.js"></script>
<script src="registros.js"></script>
</body>
</html>
