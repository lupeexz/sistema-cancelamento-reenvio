<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<main class="app shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">CR</div>
      <div>
        <strong>Controle interno</strong>
        <small>Reenvios/estornos</small>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Novo cadastro
      </a>
      <a class="active" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
        Dashboard
      </a>
      <a href="registros.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        Registros efetuados
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="secondary" onclick="logout()" style="width:100%">Sair</button>
    </div>
  </aside>

  <section class="main">
    <div class="topbar">
      <div class="page-title">
        <p class="eyebrow">Visão geral</p>
        <h1>Dashboard</h1>
        <p class="muted">Resumo visual dos dados enviados para a planilha.</p>
      </div>
      <button id="refreshBtn" type="button" class="secondary">Atualizar</button>
    </div>

    <div class="toolbar card">
      <label class="field">
        <span>Visualizar</span>
        <select id="filterMode">
          <option value="all">Todos</option>
          <option value="day">Por dia</option>
          <option value="month">Por mês</option>
        </select>
      </label>
      <label id="filterDateWrap" class="field hidden">
        <span>Data</span>
        <input id="filterDate" type="date"/>
      </label>
      <label id="filterMonthWrap" class="field hidden">
        <span>Mês</span>
        <input id="filterMonth" type="month"/>
      </label>
      <label class="field">
        <span>Tipo</span>
        <select id="filterType">
          <option value="all">Todos</option>
          <option value="Cancelamento">Cancelamento</option>
          <option value="Reenvio">Reenvio</option>
        </select>
      </label>
    </div>

    <br>

    <div class="grid three" style="margin-bottom:16px">
      <div class="stat"><b id="statCancelamento">0</b><span>Cancelamentos</span></div>
      <div class="stat"><b id="statReenvio">0</b><span>Reenvios</span></div>
      <div class="stat"><b id="statValor">R$ 0,00</b><span>Fretes / Estornos</span></div>
    </div>

    <div class="grid three">
      <div class="card">
        <h3>Registros por tipo</h3>
        <canvas id="chartTipo" class="chart" width="520" height="185"></canvas>
      </div>
      <div class="card">
        <h3>Top lojas</h3>
        <canvas id="chartLojas" class="chart" width="520" height="185"></canvas>
      </div>
      <div class="card">
        <h3>Top motivos</h3>
        <canvas id="chartMotivos" class="chart" width="520" height="185"></canvas>
      </div>
    </div>
  </section>

</main>
<script src="config.js"></script>
<script src="shared.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
