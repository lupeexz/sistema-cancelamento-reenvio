<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Dashboard</title><link rel="stylesheet" href="style.css"/></head><body><main class="app shell"><aside class="sidebar"><div class="brand"><div class="brand-badge">CR</div><div><strong>Controle interno</strong><small>Reenvios/estornos</small></div></div><nav class="nav"><a href="index.html">Novo cadastro</a><a class="active" href="dashboard.html">Dashboard</a><a href="registros.html">Registros efetuados</a></nav><div class="sidebar-footer"><button class="secondary" onclick="logout()">Sair</button></div></aside><section class="main"><div class="topbar"><div class="page-title"><p class="eyebrow">Visão geral</p><h1>Dashboard</h1><p class="muted">Resumo visual dos dados enviados para a planilha.</p></div><button id="refreshBtn" type="button">Atualizar</button></div><div class="toolbar card"><label class="field"><span>Visualizar</span><select id="filterMode"><option value="all">Todos</option><option value="day">Por dia</option><option value="month">Por mês</option></select></label><label id="filterDateWrap" class="field hidden"><span>Data</span><input id="filterDate" type="date"/></label><label id="filterMonthWrap" class="field hidden"><span>Mês</span><input id="filterMonth" type="month"/></label><label class="field"><span>Tipo</span><select id="filterType"><option value="all">Todos</option><option value="Cancelamento">Cancelamento</option><option value="Reenvio">Reenvio</option></select></label></div><br><div class="grid three"><div class="stat"><b id="statCancelamento">0</b><span>Cancelamentos</span></div><div class="stat"><b id="statReenvio">0</b><span>Reenvios</span></div><div class="stat"><b id="statValor">R$ 0,00</b><span>Fretes/estornos</span></div></div><br><div class="grid three"><div class="card"><h3>Registros por tipo</h3><canvas id="chartTipo" class="chart" width="520" height="280"></canvas></div><div class="card"><h3>Top lojas</h3><canvas id="chartLojas" class="chart" width="520" height="280"></canvas></div><div class="card"><h3>Top motivos</h3><canvas id="chartMotivos" class="chart" width="520" height="280"></canvas></div></div></section></main><script src="config.js"></script><script src="shared.js"></script><script src="dashboard.js"></script></body></html>
